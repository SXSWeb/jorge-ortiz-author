 <!--
    Assassin's Nocturne logo — compound path split into 10 individually
    colourable shapes. Each <path> has its own fill so you can select and
    change them independently in any SVG editor (Inkscape, Figma,
    SVG-edit, etc.).

    Suggested palette starting points (Assassin's Nocturne):
      #8a63ad  book-1 purple
      #3a5f43  forest green
      #f4ecd9  parchment (use on dark backgrounds)
      #1c1410  ink/near-black
      currentColor  inherits from CSS (good for the default single-colour use)

    Path IDs / what each shape appears to be (verified by visual position
    in the 512x512 canvas):
      path-left-main    — left figure: the main elf/character silhouette
      path-top-right    — top-right angular rune/letter shape
      path-top-left     — top-left collar/secondary detail on left figure
      path-right-block  — right-side shield or block shape
      path-center-left  — small centre-left fill detail
      path-center-mid   — centre mid detail
      path-lower-left   — lower left cape/trailing figure shape
      path-lower-right-a — lower right detail A
      path-lower-right-b — lower right detail B (the "glow" badge shape)
      path-sweep        — sweeping tail / flow shape, bottom right
  -->
